<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Repository Finder</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>GitHub Repositories</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search repositories..." value="javascript">
            <button id="searchBtn">Search</button>
        </div>
        <div class="filter-container">
            <select id="languageFilter">
                <option value="">All Languages</option>
                <option value="JavaScript">JavaScript</option>
                <option value="Python">Python</option>
                <option value="Java">Java</option>
                <option value="Go">Go</option>
                <option value="Rust">Rust</option>
            </select>
            <select id="sortFilter">
                <option value="stars">⭐ Most Stars</option>
                <option value="forks">🍴 Most Forks</option>
                <option value="updated">📅 Recently Updated</option>
            </select>
            <button id="favoritesBtn">❤️ View Favorites</button>
        </div>
    </header>

    <main>
        <div id="loadingSpinner" class="loading">Loading...</div>
        <div id="errorMessage" class="error"></div>
        <div id="reposContainer" class="repos-grid"></div>
    </main>

    <footer>
        <p>Data from GitHub API</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
